<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    ordered lists:
    <ol type="a">
        <li>csit</li>
        <li>bitm</li>
        <li>bca</li>
    </ol>

    unordered lists:
    <ul type="circle">
        <li>csit</li>
        <li>bitm</li>
        <li>bca</li>
    </ul>

    Nested List:
    <h2>Cafe Menu</h2>
    <ol>
        <li>Hot drinks
            <ol type="a">
                <li>Milk coffee</li>
                <li>Americano</li>
            </ol>
        </li>
        <li>cold drinks
            <ul type="disc">
                <li>Iced Latte</li>
                <li>Milkshake</li>
            </ul>
        </li>
    </ol>
</body>
</html>
