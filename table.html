<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table and nested table</title>
</head>
<body>
    Table expample
    <table border="1" bordercolor="red">
        <tr>
            <th>S.N.</th>
            <th>Student name</th>
            <th>Address</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Ram</td>
            <td>Chitwan</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Sita</td>
            <td>Janakpur</td>
        </tr>
    </table>

    <h2>Nested Table</h2>
    <table border="1" bordercolor="red">
        <tr>
            <td>Table 1</td>
            <td>Table 1
                <table border="1" bordercolor="green">
                    <tr>
                        <td>Table 2</td>
                        <td>Table 2</td>
                    </tr>
                    <tr>
                        <td>Table 2</td>
                        <td>Table 2</td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <td>Table 1</td>
            <td>Table 1</td>
        </tr>
    </table>
</body>
</html>
